<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in &mdash; Magnolia Horses</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #8b3a3a; --brand-light: #f5ece8;
      --text: #2a1f14; --text2: #6b5a48;
      --surface: #fff; --surface2: #f5f1eb;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
      --red: #a32d2d; --red-bg: #fcebeb;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--surface2); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 380px; }
    .brand { font-family: Georgia, serif; font-size: 22px; font-weight: 600; color: var(--brand); margin-bottom: 0.25rem; }
    .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    input[type="email"], input[type="password"] { width: 100%; padding: 10px 12px; font-size: 15px; font-family: inherit; background: var(--surface2); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); outline: none; }
    input:focus { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(139,58,58,0.1); }
    .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); margin-bottom: 1rem; }
    .remember input { width: auto; }
    .btn { width: 100%; padding: 11px; font-size: 15px; font-weight: 500; font-family: inherit; background: var(--brand); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; }
    .btn:hover { opacity: 0.88; }
    .flash { padding: 8px 12px; border-radius: var(--radius); font-size: 13px; margin-bottom: 1rem; background: var(--red-bg); color: var(--red); }
    .footer-link { text-align: center; margin-top: 1.25rem; font-size: 13px; color: var(--text2); }
    .footer-link a { color: var(--brand); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">Magnolia Horses</div>
  <div class="subtitle">Sign in to your account</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="field">
      <label>Email address</label>
      <input type="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password"/>
    </div>
    <div class="remember">
      <input type="checkbox" name="remember" id="remember"/>
      <label for="remember" style="text-transform:none;letter-spacing:0;font-size:13px;">Keep me signed in</label>
    </div>
    <button type="submit" class="btn">Sign in</button>
  </form>

  <div class="footer-link">
    Don't have an account? <a href="/register">Create one</a>
  </div>
  <div class="footer-link" style="margin-top:0.5rem;">
    <a href="/">Back to search</a>
  </div>
</div>
</body>
</html>
