<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register &mdash; Magnolia Horses</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #8b3a3a; --brand-light: #f5ece8;
      --text: #2a1f14; --text2: #6b5a48; --text3: #9c8a78;
      --surface: #fff; --surface2: #f5f1eb;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
      --red: #a32d2d; --red-bg: #fcebeb;
      --green: #3b6d11; --green-bg: #eaf3de;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--surface2); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 400px; }
    .brand { font-family: Georgia, serif; font-size: 22px; font-weight: 600; color: var(--brand); margin-bottom: 0.25rem; }
    .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; font-size: 15px; font-family: inherit; background: var(--surface2); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); outline: none; }
    input:focus { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(139,58,58,0.1); }
    .btn { width: 100%; padding: 11px; font-size: 15px; font-weight: 500; font-family: inherit; background: var(--brand); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; margin-top: 0.5rem; }
    .btn:hover { opacity: 0.88; }
    .flash { padding: 8px 12px; border-radius: var(--radius); font-size: 13px; margin-bottom: 1rem; }
    .flash.error   { background: var(--red-bg);   color: var(--red); }
    .flash.success { background: var(--green-bg); color: var(--green); }
    .footer-link { text-align: center; margin-top: 1.25rem; font-size: 13px; color: var(--text2); }
    .footer-link a { color: var(--brand); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">Magnolia Horses</div>
  <div class="subtitle">Create your account</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="field">
      <label>Your name</label>
      <input type="text" name="name" placeholder="e.g. Jane Smith" required autocomplete="name"/>
    </div>
    <div class="field">
      <label>Email address</label>
      <input type="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="At least 8 characters" required autocomplete="new-password"/>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" name="confirm" placeholder="Repeat your password" required autocomplete="new-password"/>
    </div>
    <button type="submit" class="btn">Create account</button>
  </form>

  <div class="footer-link">
    Already have an account? <a href="/login">Sign in</a>
  </div>
  <div class="footer-link" style="margin-top:0.5rem;">
    <a href="/">Back to search</a>
  </div>
</div>
</body>
</html>
