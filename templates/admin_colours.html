<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colour corrections — Magnolia Horses</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f1eb; --surface: #fff; --surface2: #f1f0ec;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
      --text: #2a1f14; --text2: #6b5a48; --text3: #9c8a78;
      --brand: #8b3a3a; --brand-light: #f5ece8;
      --green: #3b6d11; --green-bg: #eaf3de;
      --red: #a32d2d; --red-bg: #fcebeb;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
    .page { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

    .brand-header { display: flex; align-items: center; gap: 14px; padding: 1.25rem 0 1rem; margin-bottom: 0.25rem; border-bottom: 0.5px solid rgba(139,58,58,0.2); }
    .brand-name { font-size: 22px; font-weight: 600; color: var(--brand); font-family: Georgia, serif; }
    .brand-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .back-link { font-size: 13px; color: var(--brand); text-decoration: none; margin-left: auto; }
    .back-link:hover { text-decoration: underline; }

    .panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
    .panel-title { font-size: 16px; font-weight: 500; margin-bottom: 1rem; color: var(--brand); }

    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-row input { flex: 1; padding: 7px 10px; font-size: 14px; font-family: inherit; background: var(--surface2); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); outline: none; }
    .search-row input:focus { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(139,58,58,0.1); }

    .btn { padding: 7px 16px; font-size: 14px; font-family: inherit; border-radius: var(--radius); cursor: pointer; border: none; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; font-family: inherit; }
    .btn-save { background: var(--brand); color: #fff; border: none; }
    .btn-save:hover { opacity: 0.88; }
    .btn-delete { background: transparent; color: var(--red); border: 0.5px solid var(--red); }
    .btn-delete:hover { background: var(--red-bg); }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 6px 10px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid var(--border); }
    td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--brand-light); }

    .colour-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 2px 7px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--surface2); color: var(--text2); }
    .colour-swatch { width: 9px; height: 9px; border-radius: 50%; border: 0.5px solid rgba(0,0,0,0.15); }
    .override-badge { font-size: 10px; padding: 1px 6px; border-radius: 20px; background: var(--green-bg); color: var(--green); border: 0.5px solid rgba(59,109,17,0.2); margin-left: 6px; }

    select.colour-select { padding: 4px 8px; font-size: 13px; font-family: inherit; background: var(--surface2); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); outline: none; appearance: none; }

    .empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 14px; }
    .toast { display: none; position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--brand); color: #fff; padding: 10px 18px; border-radius: var(--radius); font-size: 14px; z-index: 999; }
    .toast.show { display: block; animation: fadeout 2.5s forwards; }
    @keyframes fadeout { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
  </style>
</head>
<body>
<div class="page">

  <div class="brand-header">
    <div>
      <div class="brand-name">Magnolia Horses</div>
      <div class="brand-sub">Colour correction admin</div>
    </div>
    <a href="/" class="back-link">← Back to search</a>
  </div>

  <div class="panel">
    <div class="panel-title">Find a horse to correct</div>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Type a horse name…" oninput="searchHorses()" />
    </div>
    <div id="search-results"></div>
  </div>

  <div class="panel">
    <div class="panel-title">Saved colour corrections</div>
    <div id="overrides-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const COLOURS = ['Bay', 'Dark bay/brown', 'Chestnut', 'Grey', 'Black', 'Roan'];
  const COLOUR_META = {
    'bay':            '#8B4513',
    'dark bay/brown': '#3B1F0A',
    'chestnut':       '#C4622D',
    'grey':           '#A8A8A8',
    'black':          '#2A2A2A',
    'roan':           '#9E6B55'
  };

  function swatch(colour) {
    if (!colour) return '';
    const hex = COLOUR_META[colour.toLowerCase()] || '#888';
    return `<span class="colour-chip"><span class="colour-swatch" style="background:${hex}"></span>${colour}</span>`;
  }

  function colourSelect(current, horseName) {
    const opts = COLOURS.map(c =>
      `<option value="${c}" ${c.toLowerCase() === (current||'').toLowerCase() ? 'selected' : ''}>${c}</option>`
    ).join('');
    return `<select class="colour-select" id="sel-${escId(horseName)}">${opts}</select>`;
  }

  function escId(str) { return str.replace(/[^a-zA-Z0-9]/g, '_'); }
  function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show';
    setTimeout(() => t.className = 'toast', 2600);
  }

  let searchTimer;
  function searchHorses() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(async () => {
      const q = document.getElementById('search-input').value.trim();
      if (q.length < 2) {
        document.getElementById('search-results').innerHTML = '';
        return;
      }
      const res  = await fetch(`/api/colours/runners?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      renderSearchResults(data);
    }, 300);
  }

  function renderSearchResults(data) {
    const el = document.getElementById('search-results');
    if (data.length === 0) {
      el.innerHTML = `<div class="empty">No horses found</div>`;
      return;
    }
    let html = `<table><thead><tr>
      <th>Horse</th><th>Meeting</th><th>Current colour</th><th>Correct to</th><th></th>
    </tr></thead><tbody>`;
    data.forEach(r => {
      html += `<tr>
        <td>
          ${escHtml(r.horse_name)}
          ${r.has_override ? '<span class="override-badge">corrected</span>' : ''}
        </td>
        <td style="font-size:12px;color:var(--text2)">${escHtml(r.meeting)}</td>
        <td>${swatch(r.colour)}</td>
        <td>${colourSelect(r.colour, r.horse_name)}</td>
        <td><button class="btn btn-sm btn-save" onclick="saveOverride('${escHtml(r.horse_name)}')">Save</button></td>
      </tr>`;
    });
    html += `</tbody></table>`;
    el.innerHTML = html;
  }

  async function saveOverride(horseName) {
    const selId  = `sel-${horseName.replace(/[^a-zA-Z0-9]/g, '_')}`;
    const colour = document.getElementById(selId).value;
    const res    = await fetch('/api/colours/override', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ horse_name: horseName, colour })
    });
    if (res.ok) {
      showToast(`Saved: ${horseName} → ${colour}`);
      loadOverrides();
      searchHorses();
    }
  }

  async function deleteOverride(horseName) {
    await fetch(`/api/colours/override/${encodeURIComponent(horseName)}`, { method: 'DELETE' });
    showToast(`Override removed for ${horseName}`);
    loadOverrides();
  }

  async function loadOverrides() {
    const res  = await fetch('/api/colours/overrides');
    const data = await res.json();
    const el   = document.getElementById('overrides-list');
    if (data.length === 0) {
      el.innerHTML = `<div class="empty">No corrections saved yet</div>`;
      return;
    }
    let html = `<table><thead><tr>
      <th>Horse</th><th>Corrected colour</th><th>Last updated</th><th></th>
    </tr></thead><tbody>`;
    data.forEach(o => {
      html += `<tr>
        <td>${escHtml(o.horse_name)}</td>
        <td>${swatch(o.colour)}</td>
        <td style="font-size:12px;color:var(--text2)">${escHtml(o.updated_at || '')}</td>
        <td><button class="btn btn-sm btn-delete" onclick="deleteOverride('${escHtml(o.horse_name)}')">Remove</button></td>
      </tr>`;
    });
    html += `</tbody></table>`;
    el.innerHTML = html;
  }

  loadOverrides();
</script>
</body>
</html>
